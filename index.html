<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Depth Camera</title>
<style>
  :root {
    --bg: #0b0e14;
    --ink: #e8ecf4;
    --dim: #7b8494;
    --near: #ffcc00;   /* matches the iOS app's near color */
    --far: #001a80;
    --pill: rgba(20, 24, 34, 0.78);
    --line: rgba(232, 236, 244, 0.14);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); }
  body {
    font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, monospace;
    color: var(--ink);
    display: grid; place-items: center;
  }

  /* Live view fills the screen */
  #view { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  video { display: none; }

  /* Loading / status card */
  #status {
    position: fixed; inset: 0; display: grid; place-items: center;
    background: var(--bg); z-index: 10; text-align: center; padding: 24px;
  }
  #status h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
  #status p  { font-size: 12px; color: var(--dim); margin-top: 10px; line-height: 1.6; max-width: 34ch; }
  #crumb     { font-size: 10px; color: var(--dim); margin-top: 14px; opacity: 0.7; }
  #bar {
    width: min(260px, 70vw); height: 3px; margin: 18px auto 0;
    background: var(--line); border-radius: 2px; overflow: hidden;
  }
  #bar i {
    display: block; height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--far), var(--near));
    transition: width 0.2s;
  }
  #startBtn {
    margin-top: 22px; padding: 12px 26px; font: inherit; font-size: 13px;
    letter-spacing: 0.06em; color: var(--bg); background: var(--near);
    border: none; border-radius: 999px; cursor: pointer; display: none;
  }

  /* HUD */
  .hud { position: fixed; z-index: 5; display: flex; gap: 8px; align-items: center; }
  #topHud { top: max(14px, env(safe-area-inset-top)); left: 14px; right: 14px; justify-content: space-between; }
  .badge {
    padding: 6px 12px; font-size: 11px; letter-spacing: 0.05em;
    background: var(--pill); border: 1px solid var(--line);
    border-radius: 999px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  #fps b { color: var(--near); font-weight: 600; }

  /* Legend: the palette itself, labeled */
  #legend {
    position: fixed; z-index: 5; right: 14px; top: 50%;
    transform: translateY(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    font-size: 10px; color: var(--ink); letter-spacing: 0.08em;
  }
  #legend .ramp {
    width: 6px; height: 120px; border-radius: 3px;
    background: linear-gradient(to bottom, var(--near), #00b3a4, var(--far));
    border: 1px solid var(--line);
  }

  /* Mode switch */
  #modes {
    bottom: max(20px, env(safe-area-inset-bottom)); left: 50%;
    transform: translateX(-50%);
    background: var(--pill); border: 1px solid var(--line); border-radius: 999px;
    padding: 4px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  #modes button {
    font: inherit; font-size: 12px; letter-spacing: 0.05em;
    padding: 9px 20px; border: none; border-radius: 999px;
    background: transparent; color: var(--dim); cursor: pointer;
  }
  #modes button.on { background: var(--ink); color: var(--bg); }
  .hidden { display: none !important; }
</style>
</head>
<body>

<canvas id="view"></canvas>
<video id="cam" autoplay playsinline muted></video>

<div id="status">
  <div>
    <h1>Depth Camera</h1>
    <p id="statusMsg">Loading depth model…</p>
    <div id="bar"><i id="barFill"></i></div>
    <button id="startBtn">Start camera</button>
    <p id="crumb"></p>
  </div>
</div>

<div class="hud" id="topHud">
  <span class="badge" id="fps">— <b>fps</b></span>
  <span class="badge" id="backend">…</span>
</div>

<div id="legend" class="hidden">
  <span>NEAR</span><div class="ramp"></div><span>FAR</span>
</div>

<div class="hud" id="modes">
  <button id="mDepth" class="on">Depth</button>
  <button id="mColor">Color</button>
</div>

<script type="module">
// Main thread = UI only. All ML runs in worker.js (same-origin module worker).
// History: main-thread inference/init froze the UI and the iOS watchdog killed
// the page; ORT's built-in cross-origin proxy worker fails to boot on iOS
// Safari. A same-origin worker sidesteps both.

const cam      = document.getElementById("cam");
const view     = document.getElementById("view");
const ctx      = view.getContext("2d");
const statusEl = document.getElementById("status");
const msgEl    = document.getElementById("statusMsg");
const barFill  = document.getElementById("barFill");
const startBtn = document.getElementById("startBtn");
const fpsEl    = document.getElementById("fps");
const backendEl= document.getElementById("backend");
const legend   = document.getElementById("legend");
const mDepth   = document.getElementById("mDepth");
const mColor   = document.getElementById("mColor");
const crumbEl  = document.getElementById("crumb");

// --- Crash breadcrumbs (localStorage survives a tab crash)
const mark = (s) => { try { localStorage.setItem("crumb", s); } catch {} };
const lastCrumb = (() => { try { return localStorage.getItem("crumb"); } catch { return null; } })();
if (lastCrumb && lastCrumb !== "clean exit") {
  crumbEl.textContent = `previous session ended at: ${lastCrumb}`;
}
addEventListener("pagehide", () => mark("clean exit"));

const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent)
  || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

let mode = "depth";
mDepth.onclick = () => setMode("depth");
mColor.onclick = () => setMode("color");
function setMode(m) {
  mode = m;
  mDepth.classList.toggle("on", m === "depth");
  mColor.classList.toggle("on", m === "color");
  legend.classList.toggle("hidden", m !== "depth");
}

// --- Worker
const INFER_W     = isIOS ? 256 : 384;
const THROTTLE_MS = isIOS ? 150 : 0;

const capCanvas = document.createElement("canvas");
const capCtx    = capCanvas.getContext("2d", { willReadFrequently: true });
const depthCanvas = document.createElement("canvas");
const depthCtx    = depthCanvas.getContext("2d");

let out = null;               // reusable ImageData for worker results
let haveDepth = false;
let workerBusy = false;
let lastDepthAt = 0;
let frames = 0, totalFrames = 0, lastTick = performance.now();

mark("starting worker");
const worker = new Worker("./worker.js", { type: "module" });

worker.onerror = (e) => {
  const detail = e.message || "worker.js failed to start — is it committed next to index.html?";
  mark(`worker error: ${detail}`);
  msgEl.textContent = `Worker failed: ${detail}`;
};

worker.onmessage = (e) => {
  const m = e.data;
  if (m.type === "boot") {
    mark("worker booted, loading model");
  } else if (m.type === "progress") {
    barFill.style.width = `${m.pct}%`;
  } else if (m.type === "ready") {
    mark("model loaded");
    backendEl.textContent = (m.backend === "webgpu" ? "GPU" : "WASM \u00b7 worker") + " \u00b7 Depth Anything V2";
    msgEl.textContent = "Model ready. The camera stays on this device \u2014 nothing is uploaded.";
    barFill.style.width = "100%";
    startBtn.style.display = "inline-block";
  } else if (m.type === "error") {
    mark(`model load error: ${m.message}`);
    msgEl.textContent = `Model failed to load: ${m.message}`;
  } else if (m.type === "depth") {
    if (!out || out.width !== m.width || out.height !== m.height) {
      out = new ImageData(m.width, m.height);
      depthCanvas.width = m.width; depthCanvas.height = m.height;
    }
    out.data.set(new Uint8ClampedArray(m.buffer));
    depthCtx.putImageData(out, 0, 0);
    haveDepth = true;
    workerBusy = false;
    lastDepthAt = performance.now();
    totalFrames++;
    if (m.ms > 1500) {
      fpsEl.innerHTML = `${(m.ms / 1000).toFixed(1)}s <b>/frame</b>`;
      mark(`running ok, ${(m.ms / 1000).toFixed(1)}s/frame, frame ${totalFrames}`);
    } else {
      countFrame();
    }
  } else if (m.type === "frameError") {
    mark(`frame error: ${m.message}`);
    workerBusy = false;
  }
};

worker.postMessage({
  type: "load",
  dtype: isIOS ? "q4" : "q8",
  tryWebGPU: !isIOS,
  inferSize: isIOS ? 252 : 378,   // model's internal resolution (multiple of 14)
});

// --- Camera
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment", width: { ideal: 1280 } },
    audio: false,
  });
  cam.srcObject = stream;
  await new Promise((r) => (cam.onloadedmetadata = r));
  await cam.play();
}

// --- Frame pump: send a frame whenever the worker is idle (plus iOS breather)
function pumpFrame() {
  if (workerBusy || mode !== "depth" || !cam.videoWidth) return;
  if (performance.now() - lastDepthAt < THROTTLE_MS) return;

  const vw = cam.videoWidth, vh = cam.videoHeight;
  const ih = Math.round((INFER_W * vh) / vw);
  if (capCanvas.width !== INFER_W || capCanvas.height !== ih) {
    capCanvas.width = INFER_W; capCanvas.height = ih;
  }
  capCtx.drawImage(cam, 0, 0, INFER_W, ih);
  const img = capCtx.getImageData(0, 0, INFER_W, ih);

  workerBusy = true;
  worker.postMessage(
    { type: "frame", buffer: img.data.buffer, width: INFER_W, height: ih },
    [img.data.buffer]);
}

// --- Render loop: cheap, draw-only, never waits on the model
function render() {
  const dpr = Math.min(devicePixelRatio || 1, 2);
  const W = Math.round(innerWidth * dpr), H = Math.round(innerHeight * dpr);
  if (view.width !== W || view.height !== H) { view.width = W; view.height = H; }

  if (mode === "color" || !haveDepth) {
    if (cam.videoWidth) drawCover(cam, cam.videoWidth, cam.videoHeight);
  } else {
    drawCover(depthCanvas, depthCanvas.width, depthCanvas.height);
  }
  pumpFrame();
  requestAnimationFrame(render);
}

function drawCover(src, sw, sh) {
  const scale = Math.max(view.width / sw, view.height / sh);
  const dw = sw * scale, dh = sh * scale;
  ctx.drawImage(src, (view.width - dw) / 2, (view.height - dh) / 2, dw, dh);
}

function countFrame() {
  frames++;
  const now = performance.now();
  if (now - lastTick >= 1000) {
    fpsEl.innerHTML = `${frames} <b>fps</b>`;
    mark(`running ok, ${frames} fps, frame ${totalFrames}`);
    frames = 0; lastTick = now;
  }
}

// --- Boot (model loads in the worker; button appears on "ready")
startBtn.onclick = async () => {
  startBtn.disabled = true;
  try {
    mark("starting camera");
    await startCamera();
    mark("camera started");
    statusEl.remove();
    setMode("depth");
    render();
  } catch (e) {
    mark(`camera error: ${e && e.message}`);
    msgEl.textContent = "Camera blocked. Allow camera access and make sure the page is served over HTTPS, then reload.";
    startBtn.disabled = false;
  }
};
</script>
</body>
</html>
